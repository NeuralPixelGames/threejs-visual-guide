<!DOCTYPE html>
<html lang="en">
<head>
	<title>WebGL vs WebGPU - Three.js Encyclopedia</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		body { overflow: hidden; }
		#container { width: 100%; height: 100vh; }

		#mode-panel {
			position: fixed; top: 52px; right: 10px; z-index: 10;
			background: rgba(10, 14, 26, 0.88); backdrop-filter: blur(10px);
			border: 1px solid rgba(74, 158, 255, 0.25); border-radius: 10px;
			padding: 14px 16px; font-family: 'Inter', system-ui, sans-serif;
		}
		#mode-panel .panel-title {
			font-size: 10px; font-weight: 700; text-transform: uppercase;
			letter-spacing: 0.12em; color: #4a9eff; margin-bottom: 10px;
		}
		#mode-panel label {
			display: flex; align-items: center; gap: 8px;
			padding: 5px 8px; border-radius: 6px; cursor: pointer;
			font-size: 13px; color: #aab7d2; transition: all 0.15s;
		}
		#mode-panel label:hover { background: rgba(74, 158, 255, 0.08); color: #e0e5f0; }
		#mode-panel label.active { background: rgba(74, 158, 255, 0.15); color: #fff; }
		#mode-panel input[type="radio"] {
			appearance: none; width: 14px; height: 14px; border-radius: 50%;
			border: 2px solid #4a6a9a; background: transparent; cursor: pointer; flex-shrink: 0;
		}
		#mode-panel input[type="radio"]:checked {
			border-color: #4a9eff; background: #4a9eff;
			box-shadow: inset 0 0 0 2px rgba(10, 14, 26, 0.9);
		}

		#stats-overlay {
			position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
			background: rgba(6, 10, 20, 0.88); backdrop-filter: blur(10px);
			border: 1px solid rgba(74, 158, 255, 0.2); border-radius: 10px;
			padding: 12px 24px; font-family: 'SF Mono', 'Fira Code', monospace;
			display: flex; gap: 32px; align-items: center;
		}
		.stat-block { text-align: center; }
		.stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7394; }
		.stat-value { font-size: 28px; font-weight: 800; color: #22c55e; }
		.stat-value.mode-label { font-size: 16px; color: #4a9eff; font-weight: 700; }
		.stat-sub { font-size: 10px; color: #8899bb; }
		.stat-compare { font-size: 11px; color: #8899bb; margin-top: 2px; }
		.stat-compare .webgl-fps { color: #fbbf24; }
		.stat-compare .webgpu-fps { color: #22c55e; }

		#benchmark-btn {
			position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 10;
			background: rgba(74, 158, 255, 0.15); border: 1px solid rgba(74, 158, 255, 0.4);
			border-radius: 8px; padding: 8px 20px; color: #4a9eff; font-size: 12px;
			font-weight: 600; cursor: pointer; font-family: 'Inter', system-ui, sans-serif;
		}
		#benchmark-btn:hover { background: rgba(74, 158, 255, 0.25); }
		#benchmark-btn:disabled { opacity: 0.4; cursor: not-allowed; }
	</style>
</head>
<body>
<a href="../index.html" id="back-btn">&larr; Hub</a>
<div id="info">
	<strong>WebGL vs WebGPU</strong> &mdash; Toggle renderer backend, benchmark with stress test
</div>
<div id="container"></div>

<div id="mode-panel">
	<div class="panel-title">Renderer Backend</div>
	<label class="active"><input type="radio" name="mode" value="webgpu" checked><span>WebGPU</span></label>
	<label><input type="radio" name="mode" value="webgl"><span>WebGL 2</span></label>
</div>

<div id="stats-overlay">
	<div class="stat-block">
		<div class="stat-label">Backend</div>
		<div class="stat-value mode-label" id="current-mode">WebGPU</div>
	</div>
	<div class="stat-block">
		<div class="stat-label">FPS</div>
		<div class="stat-value" id="current-fps">--</div>
	</div>
	<div class="stat-block">
		<div class="stat-label">Objects</div>
		<div class="stat-value" id="current-objects" style="font-size:18px;">2,000</div>
	</div>
	<div class="stat-block">
		<div class="stat-label">Last Benchmark</div>
		<div class="stat-compare" id="benchmark-result">
			WebGL: <span class="webgl-fps">--</span> &nbsp;|&nbsp; WebGPU: <span class="webgpu-fps">--</span>
		</div>
	</div>
</div>

<button id="benchmark-btn">Run Benchmark (5s each)</button>

<script type="importmap">
{
	"imports": {
		"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.js",
		"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
	}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

const container = document.getElementById( 'container' );
const currentModeEl = document.getElementById( 'current-mode' );
const currentFpsEl = document.getElementById( 'current-fps' );
const currentObjectsEl = document.getElementById( 'current-objects' );
const benchmarkResultEl = document.getElementById( 'benchmark-result' );
const benchmarkBtn = document.getElementById( 'benchmark-btn' );

const params = { instances: 2000, autoRotate: true };
const colors = [ 0x4a9eff, 0x22c55e, 0xa855f7, 0xf97316, 0xf43f5e, 0x06b6d4, 0xeab308, 0x8b5cf6 ];

let renderer, scene, camera, controls;
let currentBackend = 'webgpu';
let frames = 0, lastFpsTime = 0, currentFps = 0;
let animId = null;
let benchmarkWebGLFps = null, benchmarkWebGPUFps = null;

function buildScene() {

	scene = new THREE.Scene();
	scene.background = new THREE.Color( 0x0a0e1a );
	scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.008 );

	scene.add( new THREE.AmbientLight( 0x303850, 0.5 ) );

	const dirLight = new THREE.DirectionalLight( 0xffeedd, 2.5 );
	dirLight.position.set( 8, 16, 6 );
	scene.add( dirLight );

	const fillLight = new THREE.DirectionalLight( 0x4488ff, 0.5 );
	fillLight.position.set( -6, 6, -4 );
	scene.add( fillLight );

	const ground = new THREE.Mesh(
		new THREE.PlaneGeometry( 200, 200 ),
		new THREE.MeshStandardMaterial( { color: 0x111825, roughness: 0.9 } )
	);
	ground.rotation.x = -Math.PI / 2;
	scene.add( ground );

	const grid = new THREE.GridHelper( 60, 60, 0x1a2540, 0x111a2e );
	grid.position.y = 0.01;
	scene.add( grid );

	buildInstances( params.instances );

}

function buildInstances( count ) {

	const toRemove = [];
	scene.traverse( c => { if ( c.isInstancedMesh ) toRemove.push( c ); } );
	toRemove.forEach( m => { m.geometry.dispose(); m.material.dispose(); scene.remove( m ); } );

	const mesh = new THREE.InstancedMesh(
		new THREE.IcosahedronGeometry( 0.4, 1 ),
		new THREE.MeshStandardMaterial( { roughness: 0.3, metalness: 0.6 } ),
		count
	);
	mesh.frustumCulled = false;

	const dummy = new THREE.Object3D();
	const color = new THREE.Color();
	const spread = Math.cbrt( count ) * 1.2;

	for ( let i = 0; i < count; i++ ) {

		dummy.position.set( (Math.random()-0.5)*spread, Math.random()*spread*0.5+0.5, (Math.random()-0.5)*spread );
		dummy.rotation.set( Math.random()*6.28, Math.random()*6.28, Math.random()*6.28 );
		dummy.scale.setScalar( 0.5 + Math.random() * 0.8 );
		dummy.updateMatrix();
		mesh.setMatrixAt( i, dummy.matrix );
		color.setHex( colors[ i % colors.length ] );
		mesh.setColorAt( i, color );

	}

	scene.add( mesh );
	currentObjectsEl.textContent = count.toLocaleString();

}

async function createRenderer( backend ) {

	if ( renderer ) {

		if ( animId ) cancelAnimationFrame( animId );
		renderer.dispose();
		container.innerHTML = '';

	}

	currentBackend = backend;
	currentModeEl.textContent = backend === 'webgpu' ? 'WebGPU' : 'WebGL 2';

	renderer = new THREE.WebGPURenderer( {
		antialias: true,
		forceWebGL: backend === 'webgl'
	} );

	renderer.setPixelRatio( window.devicePixelRatio );
	renderer.setSize( window.innerWidth, window.innerHeight );
	renderer.toneMapping = THREE.ACESFilmicToneMapping;
	container.appendChild( renderer.domElement );

	camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 500 );
	camera.position.set( 10, 8, 14 );

	controls = new OrbitControls( camera, renderer.domElement );
	controls.enableDamping = true;
	controls.dampingFactor = 0.08;
	controls.target.set( 0, 2, 0 );
	controls.autoRotate = params.autoRotate;
	controls.autoRotateSpeed = 1.0;

	await renderer.init();

	frames = 0;
	lastFpsTime = performance.now();
	animate();

}

function animate() {

	animId = requestAnimationFrame( animate );

	controls.autoRotate = params.autoRotate;
	controls.update();
	renderer.renderAsync( scene, camera );

	frames++;
	const now = performance.now();
	if ( now - lastFpsTime >= 500 ) {

		currentFps = Math.round( frames * 1000 / ( now - lastFpsTime ) );
		currentFpsEl.textContent = currentFps;
		frames = 0;
		lastFpsTime = now;

	}

}

// Mode toggle
document.querySelectorAll( '#mode-panel input[name="mode"]' ).forEach( input => {

	input.addEventListener( 'change', () => {

		document.querySelectorAll( '#mode-panel label' ).forEach( l =>
			l.classList.toggle( 'active', l.querySelector('input').value === input.value )
		);
		createRenderer( input.value );

	} );

} );

// GUI
const gui = new GUI();
gui.add( params, 'instances', 500, 50000, 500 ).name( 'Instances' ).onChange( v => {

	buildInstances( v );

} );
gui.add( params, 'autoRotate' ).name( 'Auto Rotate' );

// Benchmark
benchmarkBtn.addEventListener( 'click', async () => {

	benchmarkBtn.disabled = true;
	benchmarkBtn.textContent = 'Benchmarking WebGPU...';

	await createRenderer( 'webgpu' );
	await new Promise( r => setTimeout( r, 5000 ) );
	benchmarkWebGPUFps = currentFps;

	benchmarkBtn.textContent = 'Benchmarking WebGL...';

	await createRenderer( 'webgl' );
	await new Promise( r => setTimeout( r, 5000 ) );
	benchmarkWebGLFps = currentFps;

	benchmarkResultEl.innerHTML =
		'WebGL: <span class="webgl-fps">' + benchmarkWebGLFps + ' FPS</span> | ' +
		'WebGPU: <span class="webgpu-fps">' + benchmarkWebGPUFps + ' FPS</span>';

	// Switch back to winner
	const winner = benchmarkWebGPUFps >= benchmarkWebGLFps ? 'webgpu' : 'webgl';
	document.querySelector( '#mode-panel input[value="' + winner + '"]' ).checked = true;
	document.querySelectorAll( '#mode-panel label' ).forEach( l =>
		l.classList.toggle( 'active', l.querySelector('input').value === winner )
	);
	await createRenderer( winner );

	benchmarkBtn.disabled = false;
	benchmarkBtn.textContent = 'Run Benchmark (5s each)';

} );

// Resize
window.addEventListener( 'resize', () => {

	if ( !camera || !renderer ) return;
	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize( window.innerWidth, window.innerHeight );

} );

// Init
buildScene();
createRenderer( 'webgpu' );

</script>

<script src="../shared/demo-nav.js"></script>
</body>
</html>
