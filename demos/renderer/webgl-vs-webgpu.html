<!DOCTYPE html>
<html lang="en">
<head>
	<title>WebGL vs WebGPU - Three.js Encyclopedia</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		body { overflow: hidden; }
		#container { width: 100%; height: 100vh; }

		#fps-display {
			position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
			background: rgba(6, 10, 20, 0.88); backdrop-filter: blur(10px);
			border: 1px solid rgba(74, 158, 255, 0.2); border-radius: 10px;
			padding: 10px 24px; font-family: 'SF Mono', 'Fira Code', monospace;
			display: flex; gap: 24px; align-items: center; color: #e0e5f0;
		}
		#fps-display .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7394; }
		#fps-display .value { font-size: 22px; font-weight: 800; color: #22c55e; }
		#fps-display .backend { font-size: 14px; font-weight: 700; color: #4a9eff; }
		#fps-display .objects { font-size: 14px; color: #aab7d2; }
	</style>
</head>
<body>
<a href="../index.html" id="back-btn">&larr; Hub</a>
<div id="info">
	<strong>WebGL vs WebGPU</strong> &mdash; Stress test with instanced rendering
</div>
<div id="container"></div>

<div id="fps-display">
	<div><div class="label">Backend</div><div class="backend" id="backend-name">Detecting...</div></div>
	<div><div class="label">FPS</div><div class="value" id="fps-val">--</div></div>
	<div><div class="label">Objects</div><div class="objects" id="obj-count">2,000</div></div>
</div>

<script type="importmap">
{
	"imports": {
		"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
		"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
	}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

const container = document.getElementById( 'container' );
const backendEl = document.getElementById( 'backend-name' );
const fpsEl = document.getElementById( 'fps-val' );
const objEl = document.getElementById( 'obj-count' );

const colors = [ 0x4a9eff, 0x22c55e, 0xa855f7, 0xf97316, 0xf43f5e, 0x06b6d4, 0xeab308, 0x8b5cf6 ];

const params = { instances: 2000, autoRotate: true };

// Detect WebGPU
const hasWebGPU = !! navigator.gpu;
backendEl.textContent = hasWebGPU ? 'WebGPU' : 'WebGL 2';
backendEl.style.color = hasWebGPU ? '#22c55e' : '#fbbf24';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color( 0x0a0e1a );
scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.008 );

scene.add( new THREE.AmbientLight( 0x303850, 0.5 ) );
const dirLight = new THREE.DirectionalLight( 0xffeedd, 2.5 );
dirLight.position.set( 8, 16, 6 );
scene.add( dirLight );
scene.add( new THREE.DirectionalLight( 0x4488ff, 0.5 ).translateX( -6 ).translateY( 6 ).translateZ( -4 ) );

const ground = new THREE.Mesh(
	new THREE.PlaneGeometry( 200, 200 ),
	new THREE.MeshStandardMaterial( { color: 0x111825, roughness: 0.9 } )
);
ground.rotation.x = -Math.PI / 2;
scene.add( ground );
scene.add( new THREE.GridHelper( 60, 60, 0x1a2540, 0x111a2e ) );

function buildInstances( count ) {

	const old = [];
	scene.traverse( c => { if ( c.isInstancedMesh ) old.push( c ); } );
	old.forEach( m => { m.geometry.dispose(); m.material.dispose(); scene.remove( m ); } );

	const mesh = new THREE.InstancedMesh(
		new THREE.IcosahedronGeometry( 0.4, 1 ),
		new THREE.MeshStandardMaterial( { roughness: 0.3, metalness: 0.6 } ),
		count
	);
	mesh.frustumCulled = false;

	const dummy = new THREE.Object3D();
	const color = new THREE.Color();
	const spread = Math.cbrt( count ) * 1.2;

	for ( let i = 0; i < count; i++ ) {

		dummy.position.set( (Math.random()-0.5)*spread, Math.random()*spread*0.5+0.5, (Math.random()-0.5)*spread );
		dummy.rotation.set( Math.random()*6.28, Math.random()*6.28, Math.random()*6.28 );
		dummy.scale.setScalar( 0.5 + Math.random() * 0.8 );
		dummy.updateMatrix();
		mesh.setMatrixAt( i, dummy.matrix );
		color.setHex( colors[ i % colors.length ] );
		mesh.setColorAt( i, color );

	}

	scene.add( mesh );
	objEl.textContent = count.toLocaleString();

}

buildInstances( params.instances );

// Renderer — just use standard WebGLRenderer (works everywhere)
const renderer = new THREE.WebGLRenderer( { antialias: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.setSize( window.innerWidth, window.innerHeight );
renderer.toneMapping = THREE.ACESFilmicToneMapping;
container.appendChild( renderer.domElement );

const camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 500 );
camera.position.set( 10, 8, 14 );

const controls = new OrbitControls( camera, renderer.domElement );
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set( 0, 2, 0 );
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;

// GUI
const gui = new GUI();
gui.add( params, 'instances', 500, 50000, 500 ).name( 'Instances' ).onChange( buildInstances );
gui.add( params, 'autoRotate' ).name( 'Auto Rotate' );

// FPS
let frames = 0, lastTime = performance.now();

function animate() {

	requestAnimationFrame( animate );
	controls.autoRotate = params.autoRotate;
	controls.update();
	renderer.render( scene, camera );

	frames++;
	const now = performance.now();
	if ( now - lastTime >= 500 ) {

		fpsEl.textContent = Math.round( frames * 1000 / ( now - lastTime ) );
		frames = 0;
		lastTime = now;

	}

}

animate();

window.addEventListener( 'resize', () => {

	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize( window.innerWidth, window.innerHeight );

} );

</script>

<script src="../shared/demo-nav.js"></script>
</body>
</html>
