<!DOCTYPE html>
<html lang="en">
<head>
	<title>WebGL vs WebGPU - Three.js Encyclopedia</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		body { overflow: hidden; }

		#split-container {
			display: flex;
			width: 100%;
			height: 100vh;
			position: relative;
		}

		.panel {
			flex: 1;
			position: relative;
			overflow: hidden;
		}

		.panel canvas {
			width: 100% !important;
			height: 100% !important;
		}

		.panel-label {
			position: absolute;
			bottom: 16px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			background: rgba(10, 14, 26, 0.85);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(74, 158, 255, 0.3);
			border-radius: 8px;
			padding: 8px 18px;
			font-size: 14px;
			font-weight: 600;
			color: #e0e5f0;
			pointer-events: none;
			white-space: nowrap;
		}

		.panel-label .fps {
			color: #4a9eff;
			font-variant-numeric: tabular-nums;
		}

		.divider {
			width: 3px;
			background: linear-gradient(180deg, rgba(74, 158, 255, 0.0) 0%, rgba(74, 158, 255, 0.6) 30%, rgba(74, 158, 255, 0.6) 70%, rgba(74, 158, 255, 0.0) 100%);
			z-index: 5;
			flex-shrink: 0;
		}

		#webgpu-fallback {
			display: none;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(255, 60, 60, 0.15);
			border: 1px solid rgba(255, 60, 60, 0.4);
			border-radius: 12px;
			padding: 24px 32px;
			text-align: center;
			color: #ff6b6b;
			z-index: 20;
			font-size: 14px;
			max-width: 320px;
		}

		#webgpu-fallback h3 {
			margin: 0 0 8px;
			color: #ff8888;
		}
	</style>
</head>
<body>
<a href="../index.html" id="back-btn">&larr; Hub</a>
<div id="info">
	<strong>WebGL vs WebGPU</strong><br>
	Side-by-side InstancedMesh performance comparison
</div>

<div id="split-container">
	<div class="panel" id="panel-webgl">
		<div class="panel-label">WebGL &mdash; <span class="fps" id="fps-webgl">0</span> FPS</div>
	</div>
	<div class="divider"></div>
	<div class="panel" id="panel-webgpu">
		<div class="panel-label">WebGPU &mdash; <span class="fps" id="fps-webgpu">0</span> FPS</div>
		<div id="webgpu-fallback">
			<h3>WebGPU Not Available</h3>
			<p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+ with WebGPU flags enabled.</p>
		</div>
	</div>
</div>

<script type="importmap">
{
	"imports": {
		"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
		"three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.js",
		"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
	}
}
</script>

<script type="module">
import * as THREE from 'three';
import { WebGPURenderer } from 'three/webgpu';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

const params = {
	instances: 2000,
	autoRotate: true
};

const panelGL = document.getElementById( 'panel-webgl' );
const panelGPU = document.getElementById( 'panel-webgpu' );
const fpsGL = document.getElementById( 'fps-webgl' );
const fpsGPU = document.getElementById( 'fps-webgpu' );

const colors = [ 0x4a9eff, 0x22c55e, 0xa855f7, 0xf97316, 0xf43f5e, 0x06b6d4, 0xeab308, 0x8b5cf6 ];

// --- FPS counter helper ---
class FPSCounter {

	constructor() {

		this.frames = 0;
		this.lastTime = performance.now();
		this.fps = 0;

	}

	tick() {

		this.frames ++;
		const now = performance.now();
		if ( now - this.lastTime >= 500 ) {

			this.fps = Math.round( ( this.frames * 1000 ) / ( now - this.lastTime ) );
			this.frames = 0;
			this.lastTime = now;

		}

		return this.fps;

	}

}

// --- Build shared scene content ---
function buildScene( scene ) {

	scene.background = new THREE.Color( 0x0a0e1a );
	scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.008 );

	const ambientLight = new THREE.AmbientLight( 0x303850, 0.5 );
	scene.add( ambientLight );

	const dirLight = new THREE.DirectionalLight( 0xffeedd, 2.5 );
	dirLight.position.set( 8, 16, 6 );
	scene.add( dirLight );

	const fillLight = new THREE.DirectionalLight( 0x4488ff, 0.5 );
	fillLight.position.set( - 6, 6, - 4 );
	scene.add( fillLight );

	const groundGeo = new THREE.PlaneGeometry( 200, 200 );
	const groundMat = new THREE.MeshStandardMaterial( { color: 0x111825, roughness: 0.9 } );
	const ground = new THREE.Mesh( groundGeo, groundMat );
	ground.rotation.x = - Math.PI / 2;
	scene.add( ground );

	const gridHelper = new THREE.GridHelper( 60, 60, 0x1a2540, 0x111a2e );
	gridHelper.position.y = 0.01;
	scene.add( gridHelper );

}

// --- Build instanced mesh ---
function buildInstances( scene, count ) {

	// Remove old instanced meshes
	const toRemove = [];
	scene.traverse( child => {

		if ( child.isInstancedMesh ) toRemove.push( child );

	} );
	toRemove.forEach( m => {

		m.geometry.dispose();
		m.material.dispose();
		scene.remove( m );

	} );

	const geo = new THREE.IcosahedronGeometry( 0.4, 1 );
	const mat = new THREE.MeshStandardMaterial( {
		roughness: 0.3,
		metalness: 0.6
	} );

	const mesh = new THREE.InstancedMesh( geo, mat, count );
	mesh.frustumCulled = false;

	const dummy = new THREE.Object3D();
	const color = new THREE.Color();
	const spread = Math.cbrt( count ) * 1.2;

	for ( let i = 0; i < count; i ++ ) {

		dummy.position.set(
			( Math.random() - 0.5 ) * spread,
			Math.random() * spread * 0.5 + 0.5,
			( Math.random() - 0.5 ) * spread
		);
		dummy.rotation.set(
			Math.random() * Math.PI * 2,
			Math.random() * Math.PI * 2,
			Math.random() * Math.PI * 2
		);
		const s = 0.5 + Math.random() * 0.8;
		dummy.scale.setScalar( s );
		dummy.updateMatrix();
		mesh.setMatrixAt( i, dummy.matrix );

		color.setHex( colors[ i % colors.length ] );
		mesh.setColorAt( i, color );

	}

	scene.add( mesh );
	return mesh;

}

// ============================
// WebGL Side
// ============================
const sceneGL = new THREE.Scene();
buildScene( sceneGL );
let meshGL = buildInstances( sceneGL, params.instances );

const cameraGL = new THREE.PerspectiveCamera( 50, 1, 0.1, 500 );
cameraGL.position.set( 10, 8, 14 );

const rendererGL = new THREE.WebGLRenderer( { antialias: true } );
rendererGL.setPixelRatio( window.devicePixelRatio );
rendererGL.toneMapping = THREE.ACESFilmicToneMapping;
panelGL.appendChild( rendererGL.domElement );

const controlsGL = new OrbitControls( cameraGL, rendererGL.domElement );
controlsGL.enableDamping = true;
controlsGL.dampingFactor = 0.08;
controlsGL.target.set( 0, 2, 0 );

const fpsCounterGL = new FPSCounter();

// ============================
// WebGPU Side
// ============================
let rendererGPU = null;
let controlsGPU = null;
let meshGPU = null;
const fpsCounterGPU = new FPSCounter();

const sceneGPU = new THREE.Scene();
buildScene( sceneGPU );

const cameraGPU = new THREE.PerspectiveCamera( 50, 1, 0.1, 500 );
cameraGPU.position.set( 10, 8, 14 );

let webgpuAvailable = false;

async function initWebGPU() {

	if ( ! navigator.gpu ) {

		document.getElementById( 'webgpu-fallback' ).style.display = 'block';
		return;

	}

	try {

		rendererGPU = new WebGPURenderer( { antialias: true } );
		rendererGPU.setPixelRatio( window.devicePixelRatio );
		panelGPU.appendChild( rendererGPU.domElement );

		await rendererGPU.init();

		controlsGPU = new OrbitControls( cameraGPU, rendererGPU.domElement );
		controlsGPU.enableDamping = true;
		controlsGPU.dampingFactor = 0.08;
		controlsGPU.target.set( 0, 2, 0 );

		meshGPU = buildInstances( sceneGPU, params.instances );
		webgpuAvailable = true;

	} catch ( e ) {

		console.warn( 'WebGPU init failed:', e );
		document.getElementById( 'webgpu-fallback' ).style.display = 'block';

	}

}

// --- Sync cameras ---
function syncCameras() {

	cameraGPU.position.copy( cameraGL.position );
	cameraGPU.quaternion.copy( cameraGL.quaternion );
	if ( controlsGPU ) {

		controlsGPU.target.copy( controlsGL.target );
		controlsGPU.update();

	}

}

// --- GUI ---
const gui = new GUI();
gui.title( 'Comparison Controls' );

gui.add( params, 'instances', [ 500, 1000, 2000, 5000, 10000, 20000, 50000 ] ).name( 'Instances' ).onChange( v => {

	meshGL = buildInstances( sceneGL, v );
	if ( webgpuAvailable ) {

		meshGPU = buildInstances( sceneGPU, v );

	}

} );

gui.add( params, 'autoRotate' ).name( 'Auto Rotate' );

// --- Resize ---
function onResize() {

	const wGL = panelGL.clientWidth;
	const wGPU = panelGPU.clientWidth;
	const h = window.innerHeight;

	cameraGL.aspect = wGL / h;
	cameraGL.updateProjectionMatrix();
	rendererGL.setSize( wGL, h );

	if ( webgpuAvailable && rendererGPU ) {

		cameraGPU.aspect = wGPU / h;
		cameraGPU.updateProjectionMatrix();
		rendererGPU.setSize( wGPU, h );

	}

}

window.addEventListener( 'resize', onResize );

// --- Animate ---
const clock = new THREE.Clock();
const dummy = new THREE.Object3D();

function animateInstances( mesh, elapsed ) {

	if ( ! mesh || ! params.autoRotate ) return;

	const count = mesh.count;
	for ( let i = 0; i < count; i ++ ) {

		mesh.getMatrixAt( i, dummy.matrix );
		dummy.matrix.decompose( dummy.position, dummy.quaternion, dummy.scale );
		dummy.rotation.x += 0.002;
		dummy.rotation.y += 0.003;
		dummy.position.y += Math.sin( elapsed * 2 + i * 0.01 ) * 0.002;
		dummy.updateMatrix();
		mesh.setMatrixAt( i, dummy.matrix );

	}

	mesh.instanceMatrix.needsUpdate = true;

}

function animate() {

	requestAnimationFrame( animate );
	const elapsed = clock.getElapsedTime();

	controlsGL.update();

	// Animate both sides identically
	animateInstances( meshGL, elapsed );
	animateInstances( meshGPU, elapsed );

	syncCameras();

	// Render WebGL
	rendererGL.render( sceneGL, cameraGL );
	fpsGL.textContent = fpsCounterGL.tick();

	// Render WebGPU
	if ( webgpuAvailable && rendererGPU ) {

		rendererGPU.render( sceneGPU, cameraGPU );
		fpsGPU.textContent = fpsCounterGPU.tick();

	}

}

// --- Init ---
await initWebGPU();
onResize();
animate();
</script>
<script src="../shared/demo-nav.js"></script>
</body>
</html>
