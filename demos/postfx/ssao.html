<!DOCTYPE html>
<html lang="en">
<head>
	<title>SSAO - Three.js Encyclopedia</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
</head>
<body>
<a href="../index.html" id="back-btn">&larr; Hub</a>
<div id="info">
	<strong>Screen-Space Ambient Occlusion</strong><br>
	Realistic contact shadows in crevices and corners. Toggle AO-only view.
</div>
<div id="loading-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,26,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;color:#4a9eff;font-family:Inter,system-ui,sans-serif;font-size:16px;">Loading model...</div>
<div id="container"></div>

<style>
#controls-wrapper {
	position: fixed;
	top: 50%;
	right: 10px;
	transform: translateY(-50%);
	z-index: 10;
	display: flex;
	flex-direction: column;
	gap: 8px;
	align-items: flex-end;
}
#output-radio-panel {
	background: rgba(10, 14, 26, 0.88);
	backdrop-filter: blur(10px);
	border: 1px solid rgba(74, 158, 255, 0.25);
	border-radius: 10px;
	padding: 14px 16px;
	font-family: 'Inter', system-ui, -apple-system, sans-serif;
	color: #c0c8dc;
	min-width: 200px;
}
#output-radio-panel .panel-title {
	font-size: 12px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.8px;
	color: #fff;
	margin-bottom: 10px;
	padding-bottom: 6px;
	border-bottom: 1px solid rgba(74, 158, 255, 0.2);
}
#output-radio-panel label {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 5px 8px;
	margin: 2px 0;
	border-radius: 6px;
	cursor: pointer;
	font-size: 12px;
	transition: background 0.15s;
	color: #a0a8bc;
}
#output-radio-panel label:hover {
	background: rgba(74, 158, 255, 0.1);
	color: #e0e5f0;
}
#output-radio-panel label.active {
	background: rgba(74, 158, 255, 0.15);
	color: #fff;
}
#output-radio-panel input[type="radio"] {
	appearance: none;
	-webkit-appearance: none;
	width: 14px;
	height: 14px;
	border: 2px solid #4a6a8a;
	border-radius: 50%;
	background: transparent;
	cursor: pointer;
	flex-shrink: 0;
	position: relative;
	transition: border-color 0.15s;
}
#output-radio-panel input[type="radio"]:checked {
	border-color: #4a9eff;
}
#output-radio-panel input[type="radio"]:checked::after {
	content: '';
	position: absolute;
	top: 2px;
	left: 2px;
	width: 6px;
	height: 6px;
	border-radius: 50%;
	background: #4a9eff;
}
</style>

<div id="controls-wrapper">
	<div id="output-radio-panel">
		<div class="panel-title">Output Mode</div>
	</div>
	<div id="gui-slot"></div>
</div>

<script type="importmap">
{
	"imports": {
		"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
		"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
	}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// --- Scene setup ---
const container = document.getElementById( 'container' );
const renderer = new THREE.WebGLRenderer( { antialias: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.setSize( window.innerWidth, window.innerHeight );
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild( renderer.domElement );

const scene = new THREE.Scene();
scene.background = new THREE.Color( 0x1a1a2e );

const camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 100 );
camera.position.set( 12, 10, 14 );

const controls = new OrbitControls( camera, renderer.domElement );
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set( 0, 2, 0 );

// --- Lights ---
scene.add( new THREE.AmbientLight( 0xffffff, 0.6 ) );

const keyLight = new THREE.DirectionalLight( 0xffeedd, 1.5 );
keyLight.position.set( 8, 15, 6 );
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar( 2048 );
keyLight.shadow.camera.left = - 15;
keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15;
keyLight.shadow.camera.bottom = - 15;
keyLight.shadow.bias = - 0.001;
scene.add( keyLight );

const fillLight = new THREE.DirectionalLight( 0x6688cc, 0.5 );
fillLight.position.set( - 6, 4, - 4 );
scene.add( fillLight );

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry( 30, 30 );
const groundMat = new THREE.MeshStandardMaterial( { color: 0xcccccc, roughness: 0.9, metalness: 0.0 } );
const ground = new THREE.Mesh( groundGeo, groundMat );
ground.rotation.x = - Math.PI / 2;
ground.receiveShadow = true;
scene.add( ground );

// --- Architectural scene: stacked boxes like buildings ---
const buildingMat = new THREE.MeshStandardMaterial( { color: 0xdddddd, roughness: 0.7, metalness: 0.1 } );
const darkMat = new THREE.MeshStandardMaterial( { color: 0x999999, roughness: 0.8, metalness: 0.1 } );

function addBuilding( x, z, w, d, h ) {

	const geo = new THREE.BoxGeometry( w, h, d );
	const mesh = new THREE.Mesh( geo, Math.random() > 0.5 ? buildingMat : darkMat );
	mesh.position.set( x, h / 2, z );
	mesh.castShadow = true;
	mesh.receiveShadow = true;
	scene.add( mesh );
	return mesh;

}

// Main buildings cluster
addBuilding( 0, 0, 2, 2, 6 );
addBuilding( 2.5, 0, 1.5, 2, 4 );
addBuilding( - 2, 0, 1.5, 1.5, 5 );
addBuilding( - 2, - 2, 2, 1.5, 3 );
addBuilding( 1, - 2.5, 1.5, 1.5, 7 );
addBuilding( 3.5, - 1.5, 1, 1, 3.5 );
addBuilding( - 3.5, 1.5, 1.5, 1.5, 2.5 );
addBuilding( 0, 2.5, 2, 1, 4.5 );
addBuilding( - 1, - 4, 1.5, 2, 3 );
addBuilding( 3, 2, 1, 1.5, 5.5 );

// Smaller detail pieces - steps, ledges
for ( let i = 0; i < 8; i ++ ) {

	const x = ( Math.random() - 0.5 ) * 10;
	const z = ( Math.random() - 0.5 ) * 10;
	const s = 0.5 + Math.random() * 1.0;
	addBuilding( x, z, s, s, 0.5 + Math.random() * 1.5 );

}

// Spheres on top of some buildings
const sphereMat = new THREE.MeshStandardMaterial( { color: 0xeeeeee, roughness: 0.3, metalness: 0.5 } );
const spherePositions = [
	[ 0, 6.5, 0 ],
	[ 1, 7.5, - 2.5 ],
	[ - 2, 5.5, 0 ]
];
spherePositions.forEach( pos => {

	const sphere = new THREE.Mesh( new THREE.SphereGeometry( 0.4, 32, 32 ), sphereMat );
	sphere.position.set( ...pos );
	sphere.castShadow = true;
	scene.add( sphere );

} );

// --- Load Bedroom Model ---
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath( 'https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/libs/draco/gltf/' );
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader( dracoLoader );

gltfLoader.load( '../assets/models/minimalistic_modern_bedroom.glb', ( gltf ) => {

	const model = gltf.scene;

	// Center and scale to supplement the architectural scene
	const box = new THREE.Box3().setFromObject( model );
	const size = box.getSize( new THREE.Vector3() );
	const center = box.getCenter( new THREE.Vector3() );
	const maxDim = Math.max( size.x, size.y, size.z );
	const scale = 8 / maxDim;
	model.scale.setScalar( scale );
	model.position.set( - center.x * scale + 6, - box.min.y * scale, - center.z * scale - 5 );

	model.traverse( ( child ) => {

		if ( child.isMesh ) {

			child.castShadow = true;
			child.receiveShadow = true;

		}

	} );
	scene.add( model );

	const overlay = document.getElementById( 'loading-overlay' );
	if ( overlay ) overlay.style.display = 'none';

} );

// --- Post-processing ---
const composer = new EffectComposer( renderer );
composer.addPass( new RenderPass( scene, camera ) );

const ssaoPass = new SSAOPass( scene, camera, window.innerWidth, window.innerHeight );
ssaoPass.kernelRadius = 8;
ssaoPass.minDistance = 0.005;
ssaoPass.maxDistance = 0.1;
composer.addPass( ssaoPass );

const outputPass = new OutputPass();
composer.addPass( outputPass );

// --- Output mode radio buttons ---
const outputOptions = {
	'Default': SSAOPass.OUTPUT.Default,
	'SSAO': SSAOPass.OUTPUT.SSAO,
	'Blur': SSAOPass.OUTPUT.Blur,
	'Depth': SSAOPass.OUTPUT.Depth,
	'Normal': SSAOPass.OUTPUT.Normal
};

const params = {
	kernelRadius: 8,
	minDistance: 0.005,
	maxDistance: 0.1,
	output: 'Default'
};

const radioPanel = document.getElementById( 'output-radio-panel' );

function setOutput( key ) {

	params.output = key;
	ssaoPass.output = outputOptions[ key ];

	radioPanel.querySelectorAll( 'label' ).forEach( label => {

		label.classList.toggle( 'active', label.dataset.key === key );

	} );

}

Object.keys( outputOptions ).forEach( key => {

	const label = document.createElement( 'label' );
	label.dataset.key = key;

	const radio = document.createElement( 'input' );
	radio.type = 'radio';
	radio.name = 'ssaoOutput';
	radio.value = key;
	if ( key === params.output ) {

		radio.checked = true;
		label.classList.add( 'active' );

	}

	radio.addEventListener( 'change', () => setOutput( key ) );

	const span = document.createElement( 'span' );
	span.textContent = key;

	label.appendChild( radio );
	label.appendChild( span );
	radioPanel.appendChild( label );

} );

// --- GUI (sliders only) ---
const guiSlot = document.getElementById( 'gui-slot' );
const gui = new GUI( { container: guiSlot } );
gui.title( 'SSAO Controls' );

gui.add( params, 'kernelRadius', 1, 32, 1 ).name( 'Radius' ).onChange( v => {

	ssaoPass.kernelRadius = v;

} );
gui.add( params, 'minDistance', 0.001, 0.02, 0.001 ).name( 'Min Distance' ).onChange( v => {

	ssaoPass.minDistance = v;

} );
gui.add( params, 'maxDistance', 0.01, 0.3, 0.01 ).name( 'Max Distance' ).onChange( v => {

	ssaoPass.maxDistance = v;

} );

// --- Animate ---
function animate() {

	requestAnimationFrame( animate );
	controls.update();
	composer.render();

}

animate();

// --- Resize ---
window.addEventListener( 'resize', () => {

	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize( window.innerWidth, window.innerHeight );
	composer.setSize( window.innerWidth, window.innerHeight );

} );
</script>
<script src="../shared/demo-nav.js"></script>
</body>
</html>
