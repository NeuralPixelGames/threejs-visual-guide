<!DOCTYPE html>
<html lang="en">
<head>
	<title>Three.js Encyclopedia - Orthographic Camera</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		#camera-label {
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			background: rgba(10, 14, 26, 0.85);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(74, 158, 255, 0.3);
			border-radius: 8px;
			padding: 10px 20px;
			color: #e0e5f0;
			font-family: 'Inter', system-ui, sans-serif;
			font-size: 14px;
			pointer-events: none;
			transition: all 0.3s;
		}
		#camera-label strong {
			color: #4a9eff;
		}
		#camera-label.ortho {
			border-color: rgba(255, 102, 51, 0.5);
		}
		#camera-label.ortho strong {
			color: #ff6633;
		}

		/* Camera type radio buttons */
		#camera-type-switcher {
			position: absolute;
			top: 52px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 20;
			display: flex;
			gap: 0;
			font-family: 'Inter', system-ui, sans-serif;
			user-select: none;
		}
		#camera-type-switcher label {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.6rem 1.4rem;
			background: rgba(10, 14, 26, 0.85);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(74, 158, 255, 0.25);
			color: #8899bb;
			font-size: 0.9rem;
			font-weight: 500;
			letter-spacing: 0.03em;
			cursor: pointer;
			transition: all 0.25s ease;
		}
		#camera-type-switcher label:first-child {
			border-radius: 8px 0 0 8px;
			border-right: none;
		}
		#camera-type-switcher label:last-child {
			border-radius: 0 8px 8px 0;
		}
		#camera-type-switcher input[type="radio"] {
			appearance: none;
			-webkit-appearance: none;
			width: 14px;
			height: 14px;
			border: 2px solid #556688;
			border-radius: 50%;
			background: transparent;
			position: relative;
			cursor: pointer;
			transition: all 0.25s ease;
			flex-shrink: 0;
		}
		#camera-type-switcher input[type="radio"]:checked {
			border-color: #4a9eff;
			background: transparent;
		}
		#camera-type-switcher input[type="radio"]:checked::after {
			content: '';
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: #4a9eff;
		}
		#camera-type-switcher label:has(input:checked) {
			color: #fff;
			background: rgba(74, 158, 255, 0.15);
			border-color: rgba(74, 158, 255, 0.5);
		}
		/* Ortho active state */
		#camera-type-switcher label.ortho-active {
			border-color: rgba(255, 102, 51, 0.5);
			background: rgba(255, 102, 51, 0.12);
			color: #fff;
		}
		#camera-type-switcher label.ortho-active input[type="radio"]:checked {
			border-color: #ff6633;
		}
		#camera-type-switcher label.ortho-active input[type="radio"]:checked::after {
			background: #ff6633;
		}
		#camera-type-switcher label:hover {
			background: rgba(74, 158, 255, 0.08);
			color: #c0ccee;
		}
		.lil-gui.root { top: 100px !important; }
	</style>
</head>
<body>
	<a href="../index.html" id="back-btn">&larr; Hub</a>
	<div id="info"><strong>Orthographic Camera</strong><br>Toggle between perspective and orthographic projections</div>
	<div id="camera-type-switcher">
		<label><input type="radio" name="cameraType" value="Perspective" checked>Perspective</label>
		<label><input type="radio" name="cameraType" value="Orthographic">Orthographic</label>
	</div>
	<div id="camera-label"><strong>Perspective</strong> &mdash; Objects shrink with distance</div>
	<div id="container"></div>
	<script type="importmap">
	{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/" } }
	</script>
	<script type="module">
		import * as THREE from 'three';
		import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		let renderer, scene, perspCamera, orthoCamera, activeCamera;
		let controls, frustumHelper;
		let sceneObjects = [];

		const params = {
			cameraType: 'Perspective',
			orthoSize: 8,
			left: - 8,
			right: 8,
			top: 6,
			bottom: - 6,
			near: 0.1,
			far: 100,
			showFrustum: true,
			autoRotate: true,
			fov: 50
		};

		init();

		function init() {

			const container = document.getElementById( 'container' );

			// Renderer
			renderer = new THREE.WebGLRenderer( { antialias: true } );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1.0;
			renderer.shadowMap.enabled = true;
			renderer.shadowMap.type = THREE.PCFShadowMap;
			container.appendChild( renderer.domElement );

			// Scene
			scene = new THREE.Scene();
			scene.background = new THREE.Color( 0x0a0e1a );
			scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.008 );

			// Perspective camera
			const aspect = window.innerWidth / window.innerHeight;
			perspCamera = new THREE.PerspectiveCamera( params.fov, aspect, params.near, params.far );
			perspCamera.position.set( 10, 10, 14 );

			// Orthographic camera
			const orthoHalfH = params.orthoSize;
			const orthoHalfW = orthoHalfH * aspect;
			orthoCamera = new THREE.OrthographicCamera(
				- orthoHalfW, orthoHalfW, orthoHalfH, - orthoHalfH,
				params.near, params.far
			);
			orthoCamera.position.copy( perspCamera.position );
			orthoCamera.zoom = 1;

			activeCamera = perspCamera;

			// Controls
			controls = new OrbitControls( activeCamera, renderer.domElement );
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;
			controls.target.set( 0, 1, 0 );
			controls.autoRotate = params.autoRotate;
			controls.autoRotateSpeed = 1.0;
			controls.update();

			buildScene();
			buildLighting();
			buildGUI();

			window.addEventListener( 'resize', onResize );

			renderer.setAnimationLoop( animate );

		}

		function buildScene() {

			// Ground plane - reflective dark floor
			const groundGeo = new THREE.PlaneGeometry( 80, 80 );
			const groundMat = new THREE.MeshStandardMaterial( {
				color: 0x111522,
				roughness: 0.1,
				metalness: 0.85
			} );
			const ground = new THREE.Mesh( groundGeo, groundMat );
			ground.rotation.x = - Math.PI / 2;
			ground.position.y = - 1;
			ground.receiveShadow = true;
			scene.add( ground );

			// Grid with depth markers
			const grid = new THREE.GridHelper( 60, 60, 0x1a2540, 0x101830 );
			grid.position.y = - 0.99;
			scene.add( grid );

			// Row of identical cubes receding into distance (shows perspective vs ortho difference)
			const cubeGeo = new THREE.BoxGeometry( 1.2, 1.2, 1.2 );

			for ( let row = 0; row < 3; row ++ ) {

				const rowColors = [ 0xff3366, 0x4a9eff, 0x33ff99 ];
				const rowX = ( row - 1 ) * 4;

				for ( let i = 0; i < 8; i ++ ) {

					const mat = new THREE.MeshStandardMaterial( {
						color: rowColors[ row ],
						emissive: rowColors[ row ],
						emissiveIntensity: 0.2 + ( i * 0.05 ),
						roughness: 0.3,
						metalness: 0.7
					} );
					const cube = new THREE.Mesh( cubeGeo, mat );
					cube.position.set( rowX, 0, - i * 3 );
					cube.castShadow = true;
					scene.add( cube );
					sceneObjects.push( cube );

				}

			}

			// Central showcase - torus knot
			const knotGeo = new THREE.TorusKnotGeometry( 1.5, 0.5, 128, 32 );
			const knotMat = new THREE.MeshStandardMaterial( {
				color: 0xffaa22,
				emissive: 0x884400,
				emissiveIntensity: 0.6,
				roughness: 0.2,
				metalness: 0.9
			} );
			const knot = new THREE.Mesh( knotGeo, knotMat );
			knot.position.set( 0, 2.5, - 10 );
			knot.castShadow = true;
			scene.add( knot );
			sceneObjects.push( { mesh: knot, isKnot: true } );

			// Floating spheres at varying distances
			const sphereGeo = new THREE.SphereGeometry( 0.6, 32, 32 );
			const spherePositions = [
				[ - 6, 2, - 2 ], [ 6, 3, - 5 ], [ - 5, 4, - 12 ],
				[ 7, 2, - 18 ], [ - 8, 1.5, - 8 ], [ 3, 5, - 15 ]
			];
			const sphereColors = [ 0xaa44ff, 0x22ccff, 0xff6633, 0x44ffaa, 0xff44aa, 0xffff44 ];

			spherePositions.forEach( ( pos, i ) => {

				const mat = new THREE.MeshStandardMaterial( {
					color: sphereColors[ i ],
					emissive: sphereColors[ i ],
					emissiveIntensity: 0.4,
					roughness: 0.15,
					metalness: 0.85
				} );
				const sphere = new THREE.Mesh( sphereGeo, mat );
				sphere.position.set( pos[ 0 ], pos[ 1 ], pos[ 2 ] );
				sphere.castShadow = true;
				scene.add( sphere );

			} );

			// Neon pillars on sides
			const pillarGeo = new THREE.CylinderGeometry( 0.12, 0.12, 6, 8 );
			const pillarMat = new THREE.MeshStandardMaterial( {
				color: 0x2a3555,
				roughness: 0.3,
				metalness: 0.7
			} );

			for ( let i = 0; i < 10; i ++ ) {

				const leftPillar = new THREE.Mesh( pillarGeo, pillarMat );
				leftPillar.position.set( - 10, 2, - i * 3 );
				leftPillar.castShadow = true;
				scene.add( leftPillar );

				const rightPillar = new THREE.Mesh( pillarGeo, pillarMat );
				rightPillar.position.set( 10, 2, - i * 3 );
				rightPillar.castShadow = true;
				scene.add( rightPillar );

				// Top glow
				const glowGeo = new THREE.SphereGeometry( 0.18, 16, 16 );
				const glowColor = i % 2 === 0 ? 0x4a9eff : 0xff3366;
				const glowMat = new THREE.MeshStandardMaterial( {
					color: glowColor,
					emissive: glowColor,
					emissiveIntensity: 2.5
				} );

				const glowLeft = new THREE.Mesh( glowGeo, glowMat );
				glowLeft.position.set( - 10, 5.1, - i * 3 );
				scene.add( glowLeft );

				const glowRight = new THREE.Mesh( glowGeo, glowMat );
				glowRight.position.set( 10, 5.1, - i * 3 );
				scene.add( glowRight );

			}

			// Frustum helper box for orthographic camera
			frustumHelper = createFrustumBox();
			frustumHelper.visible = false;
			scene.add( frustumHelper );

		}

		function createFrustumBox() {

			const group = new THREE.Group();

			const edgeMat = new THREE.LineBasicMaterial( { color: 0xff6633, transparent: true, opacity: 0.6 } );

			// Create a wireframe box representing the orthographic frustum
			const geo = new THREE.BoxGeometry( 1, 1, 1 );
			const edges = new THREE.EdgesGeometry( geo );
			const wireframe = new THREE.LineSegments( edges, edgeMat );
			group.add( wireframe );

			// Translucent faces
			const faceMat = new THREE.MeshBasicMaterial( {
				color: 0xff6633,
				transparent: true,
				opacity: 0.04,
				side: THREE.DoubleSide,
				depthWrite: false
			} );
			const faceBox = new THREE.Mesh( geo, faceMat );
			group.add( faceBox );

			return group;

		}

		function updateFrustumBox() {

			if ( ! frustumHelper ) return;

			const cam = orthoCamera;
			const w = ( cam.right - cam.left ) / cam.zoom;
			const h = ( cam.top - cam.bottom ) / cam.zoom;
			const d = cam.far - cam.near;

			frustumHelper.scale.set( w, h, d );
			frustumHelper.position.copy( cam.position );
			frustumHelper.quaternion.copy( cam.quaternion );
			frustumHelper.translateZ( - cam.near - d / 2 );

		}

		function buildLighting() {

			const ambientLight = new THREE.AmbientLight( 0xffffff, 0.3 );
			scene.add( ambientLight );

			const keyLight = new THREE.DirectionalLight( 0xffffff, 2.0 );
			keyLight.position.set( 5, 12, 8 );
			keyLight.castShadow = true;
			keyLight.shadow.mapSize.setScalar( 2048 );
			keyLight.shadow.camera.near = 0.5;
			keyLight.shadow.camera.far = 60;
			keyLight.shadow.camera.left = - 20;
			keyLight.shadow.camera.right = 20;
			keyLight.shadow.camera.top = 20;
			keyLight.shadow.camera.bottom = - 20;
			keyLight.shadow.bias = - 0.001;
			scene.add( keyLight );

			const fillLight = new THREE.DirectionalLight( 0x4488ff, 0.7 );
			fillLight.position.set( - 6, 4, - 3 );
			scene.add( fillLight );

			const rimLight = new THREE.DirectionalLight( 0xff8844, 1.0 );
			rimLight.position.set( - 3, 6, - 8 );
			scene.add( rimLight );

			// Accent point lights down the corridor
			const pointLight1 = new THREE.PointLight( 0xff3366, 2.0, 20 );
			pointLight1.position.set( - 5, 3, - 6 );
			scene.add( pointLight1 );

			const pointLight2 = new THREE.PointLight( 0x4a9eff, 2.0, 20 );
			pointLight2.position.set( 5, 3, - 14 );
			scene.add( pointLight2 );

			const pointLight3 = new THREE.PointLight( 0x33ff99, 1.5, 20 );
			pointLight3.position.set( 0, 4, - 20 );
			scene.add( pointLight3 );

		}

		function switchCamera( type ) {

			const label = document.getElementById( 'camera-label' );

			if ( type === 'Perspective' ) {

				orthoCamera.position.copy( activeCamera.position );
				orthoCamera.quaternion.copy( activeCamera.quaternion );

				activeCamera = perspCamera;
				perspCamera.position.copy( orthoCamera.position );

				label.innerHTML = '<strong>Perspective</strong> &mdash; Objects shrink with distance';
				label.classList.remove( 'ortho' );

				frustumHelper.visible = false;

			} else {

				perspCamera.position.copy( activeCamera.position );
				perspCamera.quaternion.copy( activeCamera.quaternion );

				activeCamera = orthoCamera;
				orthoCamera.position.copy( perspCamera.position );

				// Shift camera angle to the right for orthographic view
				orthoCamera.position.x += 6;

				label.innerHTML = '<strong>Orthographic</strong> &mdash; No perspective distortion';
				label.classList.add( 'ortho' );

				frustumHelper.visible = params.showFrustum;

			}

			controls.object = activeCamera;
			controls.update();

		}

		function updateOrthoCamera() {

			const aspect = window.innerWidth / window.innerHeight;
			orthoCamera.left = - params.orthoSize * aspect;
			orthoCamera.right = params.orthoSize * aspect;
			orthoCamera.top = params.orthoSize;
			orthoCamera.bottom = - params.orthoSize;
			orthoCamera.near = params.near;
			orthoCamera.far = params.far;
			orthoCamera.updateProjectionMatrix();

		}

		function buildGUI() {

			const gui = new GUI();

			// Wire up the HTML radio buttons for camera type
			const radioButtons = document.querySelectorAll( '#camera-type-switcher input[name="cameraType"]' );
			radioButtons.forEach( radio => {

				radio.addEventListener( 'change', ( e ) => {

					params.cameraType = e.target.value;
					switchCamera( e.target.value );
					updateRadioStyles();

				} );

			} );

			function updateRadioStyles() {

				const labels = document.querySelectorAll( '#camera-type-switcher label' );
				labels.forEach( label => {

					const input = label.querySelector( 'input' );
					label.classList.remove( 'ortho-active' );
					if ( input.value === 'Orthographic' && input.checked ) {

						label.classList.add( 'ortho-active' );

					}

				} );

			}

			const perspFolder = gui.addFolder( 'Perspective' );
			perspFolder.add( params, 'fov', 20, 120, 1 ).name( 'FOV' ).onChange( v => {

				perspCamera.fov = v;
				perspCamera.updateProjectionMatrix();

			} );

			const orthoFolder = gui.addFolder( 'Orthographic' );
			orthoFolder.add( params, 'orthoSize', 2, 30, 0.5 ).name( 'View Size' ).onChange( () => {

				updateOrthoCamera();

			} );

			const commonFolder = gui.addFolder( 'Common' );
			commonFolder.add( params, 'near', 0.1, 20, 0.1 ).name( 'Near' ).onChange( v => {

				perspCamera.near = v;
				orthoCamera.near = v;
				perspCamera.updateProjectionMatrix();
				orthoCamera.updateProjectionMatrix();

			} );

			commonFolder.add( params, 'far', 20, 500, 1 ).name( 'Far' ).onChange( v => {

				perspCamera.far = v;
				orthoCamera.far = v;
				perspCamera.updateProjectionMatrix();
				orthoCamera.updateProjectionMatrix();

			} );

			gui.add( params, 'showFrustum' ).name( 'Show Frustum' ).onChange( v => {

				if ( activeCamera === orthoCamera ) {

					frustumHelper.visible = v;

				}

			} );

			gui.add( params, 'autoRotate' ).name( 'Auto-Rotate' ).onChange( v => {

				controls.autoRotate = v;

			} );

		}

		function onResize() {

			const aspect = window.innerWidth / window.innerHeight;

			perspCamera.aspect = aspect;
			perspCamera.updateProjectionMatrix();

			updateOrthoCamera();

			renderer.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			const time = performance.now() * 0.001;

			// Rotate cubes
			sceneObjects.forEach( ( obj, i ) => {

				if ( obj.isKnot ) {

					obj.mesh.rotation.x = time * 0.3;
					obj.mesh.rotation.y = time * 0.5;

				} else if ( obj.isMesh !== undefined ) {

					obj.rotation.y = time * 0.5 + i * 0.3;

				}

			} );

			controls.update();

			// Update frustum box if in ortho mode
			if ( activeCamera === orthoCamera && params.showFrustum ) {

				updateFrustumBox();

			}

			renderer.render( scene, activeCamera );

		}

	</script>
<script src="../shared/demo-nav.js"></script>
</body>
</html>
