<!DOCTYPE html>
<html lang="en">
<head>
	<title>Three.js Encyclopedia - Stereo Camera</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		#stereo-hint {
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			background: rgba(10, 14, 26, 0.85);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(255, 51, 102, 0.4);
			border-radius: 8px;
			padding: 8px 16px;
			color: #e0e5f0;
			font-family: 'Inter', system-ui, sans-serif;
			font-size: 12px;
			pointer-events: none;
		}
		#stereo-hint strong { color: #ff3366; }
	</style>
</head>
<body>
	<a href="../index.html" id="back-btn">&larr; Hub</a>
	<div id="info"><strong>Stereo Camera</strong><br>Anaglyph 3D effect &mdash; use red/cyan glasses for depth</div>
	<div id="stereo-hint"><strong>Tip:</strong> Wear red/cyan 3D glasses to see the depth effect</div>
	<div id="container"></div>
	<script type="importmap">
	{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/" } }
	</script>
	<script type="module">
		import * as THREE from 'three';
		import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { AnaglyphEffect } from 'three/addons/effects/AnaglyphEffect.js';

		let renderer, scene, camera, controls, effect;
		let sceneObjects = [];

		const params = {
			eyeSeparation: 0.064,
			focalLength: 15,
			enabled: true,
			autoRotate: true
		};

		init();

		function init() {

			const container = document.getElementById( 'container' );

			renderer = new THREE.WebGLRenderer( { antialias: true } );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1.0;
			renderer.shadowMap.enabled = true;
			renderer.shadowMap.type = THREE.PCFShadowMap;
			container.appendChild( renderer.domElement );

			scene = new THREE.Scene();
			scene.background = new THREE.Color( 0x0a0e1a );
			scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.01 );

			camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 1000 );
			camera.position.set( 0, 3, 15 );

			controls = new OrbitControls( camera, renderer.domElement );
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;
			controls.target.set( 0, 1, 0 );
			controls.autoRotate = params.autoRotate;
			controls.autoRotateSpeed = 0.8;
			controls.update();

			effect = new AnaglyphEffect( renderer );
			effect.setSize( window.innerWidth, window.innerHeight );

			buildScene();
			buildLighting();
			buildGUI();

			window.addEventListener( 'resize', onResize );
			renderer.setAnimationLoop( animate );

		}

		function buildScene() {

			// Ground
			const groundGeo = new THREE.PlaneGeometry( 50, 50 );
			const groundMat = new THREE.MeshStandardMaterial( { color: 0x111522, roughness: 0.12, metalness: 0.85 } );
			const ground = new THREE.Mesh( groundGeo, groundMat );
			ground.rotation.x = - Math.PI / 2;
			ground.position.y = - 1;
			ground.receiveShadow = true;
			scene.add( ground );

			const grid = new THREE.GridHelper( 40, 40, 0x1a2540, 0x101830 );
			grid.position.y = - 0.99;
			scene.add( grid );

			// Objects at varying depths to showcase stereo effect

			// Near: small spinning objects close to camera
			const nearColors = [ 0xff3366, 0xffaa22, 0x33ff99 ];
			for ( let i = 0; i < 3; i ++ ) {

				const geo = new THREE.OctahedronGeometry( 0.4 );
				const mat = new THREE.MeshStandardMaterial( {
					color: nearColors[ i ],
					emissive: nearColors[ i ],
					emissiveIntensity: 0.5,
					roughness: 0.2,
					metalness: 0.8
				} );
				const mesh = new THREE.Mesh( geo, mat );
				mesh.position.set( ( i - 1 ) * 2.5, 1 + i * 0.5, 8 );
				mesh.castShadow = true;
				scene.add( mesh );
				sceneObjects.push( { mesh, depth: 'near', index: i } );

			}

			// Mid: central torus knot
			const knotGeo = new THREE.TorusKnotGeometry( 1.5, 0.5, 128, 32 );
			const knotMat = new THREE.MeshStandardMaterial( {
				color: 0x4a9eff,
				emissive: 0x1a4080,
				emissiveIntensity: 0.7,
				roughness: 0.15,
				metalness: 0.9
			} );
			const knot = new THREE.Mesh( knotGeo, knotMat );
			knot.position.set( 0, 2, 0 );
			knot.castShadow = true;
			scene.add( knot );
			sceneObjects.push( { mesh: knot, depth: 'mid' } );

			// Mid-range orbiting spheres
			for ( let i = 0; i < 6; i ++ ) {

				const angle = ( i / 6 ) * Math.PI * 2;
				const r = 4;
				const colors = [ 0xff6633, 0xaa44ff, 0x22ccff, 0x44ffaa, 0xff44aa, 0xffff33 ];
				const geo = new THREE.SphereGeometry( 0.5, 32, 32 );
				const mat = new THREE.MeshStandardMaterial( {
					color: colors[ i ],
					emissive: colors[ i ],
					emissiveIntensity: 0.4,
					roughness: 0.2,
					metalness: 0.8
				} );
				const mesh = new THREE.Mesh( geo, mat );
				mesh.position.set( Math.cos( angle ) * r, 1.5 + Math.sin( i * 1.5 ), Math.sin( angle ) * r );
				mesh.castShadow = true;
				scene.add( mesh );
				sceneObjects.push( { mesh, depth: 'orbit', index: i, radius: r, baseAngle: angle } );

			}

			// Far: large shapes in background
			const farShapes = [
				{ geo: new THREE.BoxGeometry( 2, 2, 2 ), color: 0x2244aa, pos: [ - 8, 1.5, - 10 ] },
				{ geo: new THREE.DodecahedronGeometry( 1.5 ), color: 0x442288, pos: [ 8, 2, - 12 ] },
				{ geo: new THREE.CylinderGeometry( 0.8, 0.8, 4, 16 ), color: 0x226644, pos: [ 0, 2, - 15 ] },
				{ geo: new THREE.IcosahedronGeometry( 1.2 ), color: 0x884422, pos: [ - 12, 2, - 8 ] },
				{ geo: new THREE.TorusGeometry( 1.0, 0.3, 16, 32 ), color: 0x228888, pos: [ 12, 2, - 8 ] }
			];

			farShapes.forEach( ( s, i ) => {

				const mat = new THREE.MeshStandardMaterial( {
					color: s.color,
					emissive: s.color,
					emissiveIntensity: 0.25,
					roughness: 0.3,
					metalness: 0.7
				} );
				const mesh = new THREE.Mesh( s.geo, mat );
				mesh.position.set( ...s.pos );
				mesh.castShadow = true;
				scene.add( mesh );
				sceneObjects.push( { mesh, depth: 'far', index: i } );

			} );

			// Neon pillars at different depths
			const pillarPositions = [
				[ - 5, 0, 4 ], [ 5, 0, 4 ],
				[ - 6, 0, - 2 ], [ 6, 0, - 2 ],
				[ - 7, 0, - 8 ], [ 7, 0, - 8 ],
				[ - 8, 0, - 14 ], [ 8, 0, - 14 ]
			];

			pillarPositions.forEach( ( pos, i ) => {

				const pillarGeo = new THREE.CylinderGeometry( 0.1, 0.1, 5, 8 );
				const pillarMat = new THREE.MeshStandardMaterial( { color: 0x2a3555, roughness: 0.3, metalness: 0.7 } );
				const pillar = new THREE.Mesh( pillarGeo, pillarMat );
				pillar.position.set( pos[ 0 ], 1.5, pos[ 2 ] );
				pillar.castShadow = true;
				scene.add( pillar );

				const glowColor = i % 2 === 0 ? 0xff3366 : 0x4a9eff;
				const glowGeo = new THREE.SphereGeometry( 0.15, 16, 16 );
				const glowMat = new THREE.MeshStandardMaterial( { color: glowColor, emissive: glowColor, emissiveIntensity: 3.0 } );
				const glow = new THREE.Mesh( glowGeo, glowMat );
				glow.position.set( pos[ 0 ], 4.1, pos[ 2 ] );
				scene.add( glow );

			} );

		}

		function buildLighting() {

			scene.add( new THREE.AmbientLight( 0xffffff, 0.25 ) );

			const keyLight = new THREE.DirectionalLight( 0xffffff, 2.0 );
			keyLight.position.set( 5, 10, 6 );
			keyLight.castShadow = true;
			keyLight.shadow.mapSize.setScalar( 2048 );
			keyLight.shadow.camera.near = 0.5;
			keyLight.shadow.camera.far = 50;
			keyLight.shadow.camera.left = - 15;
			keyLight.shadow.camera.right = 15;
			keyLight.shadow.camera.top = 15;
			keyLight.shadow.camera.bottom = - 15;
			keyLight.shadow.bias = - 0.001;
			scene.add( keyLight );

			scene.add( new THREE.DirectionalLight( 0x4488ff, 0.7 ).translateX( - 5 ).translateY( 3 ).translateZ( - 3 ) );
			scene.add( new THREE.DirectionalLight( 0xff8844, 1.0 ).translateX( - 2 ).translateY( 5 ).translateZ( - 6 ) );

			const pl1 = new THREE.PointLight( 0xff3366, 2.0, 20 );
			pl1.position.set( - 5, 3, 2 );
			scene.add( pl1 );

			const pl2 = new THREE.PointLight( 0x4a9eff, 2.0, 20 );
			pl2.position.set( 5, 3, - 5 );
			scene.add( pl2 );

		}

		function buildGUI() {

			const gui = new GUI();

			gui.add( params, 'eyeSeparation', 0, 0.2, 0.001 ).name( 'Eye Separation' );

			gui.add( params, 'enabled' ).name( 'Anaglyph On' );

			gui.add( params, 'autoRotate' ).name( 'Auto-Rotate' ).onChange( v => {

				controls.autoRotate = v;

			} );

		}

		function onResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize( window.innerWidth, window.innerHeight );
			effect.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			const time = performance.now() * 0.001;

			// Animate objects
			sceneObjects.forEach( obj => {

				if ( obj.depth === 'near' ) {

					obj.mesh.rotation.x = time * 2;
					obj.mesh.rotation.y = time * 3;
					obj.mesh.position.y = 1 + obj.index * 0.5 + Math.sin( time * 2 + obj.index ) * 0.3;

				} else if ( obj.depth === 'mid' ) {

					obj.mesh.rotation.x = time * 0.3;
					obj.mesh.rotation.y = time * 0.5;

				} else if ( obj.depth === 'orbit' ) {

					const angle = obj.baseAngle + time * 0.4;
					obj.mesh.position.x = Math.cos( angle ) * obj.radius;
					obj.mesh.position.z = Math.sin( angle ) * obj.radius;
					obj.mesh.position.y = 1.5 + Math.sin( time + obj.index ) * 0.5;
					obj.mesh.rotation.y = time;

				} else if ( obj.depth === 'far' ) {

					obj.mesh.rotation.x = time * 0.15;
					obj.mesh.rotation.y = time * 0.2;

				}

			} );

			controls.update();

			// Update stereo eye separation
			effect.eyeSep = params.eyeSeparation;

			if ( params.enabled ) {

				effect.render( scene, camera );

			} else {

				renderer.render( scene, camera );

			}

		}

	</script>
<script src="../shared/demo-nav.js"></script>
</body>
</html>
