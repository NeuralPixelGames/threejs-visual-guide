<!DOCTYPE html>
<html lang="en">
<head>
	<title>Three.js Encyclopedia - Video Texture</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link rel="stylesheet" href="../shared/demo-base.css">
	<style>
		#video-controls {
			position: fixed;
			bottom: 1rem;
			left: 50%;
			transform: translateX(-50%);
			z-index: 50;
			display: flex;
			align-items: center;
			gap: 0.75rem;
			background: rgba(10, 14, 26, 0.85);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border: 1px solid rgba(74, 158, 255, 0.25);
			border-radius: 0.75rem;
			padding: 0.625rem 1.25rem;
			font-family: inherit;
		}
		#video-controls button {
			background: rgba(74, 158, 255, 0.12);
			border: 1px solid rgba(74, 158, 255, 0.35);
			border-radius: 0.375rem;
			color: #4a9eff;
			padding: 0.375rem 0.875rem;
			font-size: 0.8125rem;
			font-family: inherit;
			cursor: pointer;
			transition: all 0.2s;
			white-space: nowrap;
		}
		#video-controls button:hover {
			background: rgba(74, 158, 255, 0.25);
			border-color: #4a9eff;
		}
		#video-controls button.active {
			background: rgba(74, 158, 255, 0.3);
			border-color: #4a9eff;
			color: #fff;
		}
		#video-controls span {
			color: rgba(224, 229, 240, 0.7);
			font-size: 0.75rem;
		}
		#license-note {
			position: fixed;
			bottom: 1rem;
			right: 1rem;
			z-index: 50;
			background: rgba(10, 14, 26, 0.8);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border: 1px solid rgba(168, 85, 247, 0.2);
			border-radius: 0.625rem;
			padding: 0.75rem 1rem;
			color: rgba(230, 236, 245, 0.84);
			font-family: inherit;
			font-size: 0.6875rem;
			max-width: 15rem;
			line-height: 1.5;
		}
		#license-note a {
			color: #a78bfa;
		}
		#license-note strong {
			color: #e0e5f0;
		}
		@media all and (max-width: 640px) {
			#video-controls {
				bottom: 0.5rem;
				padding: 0.5rem 0.75rem;
				gap: 0.375rem;
			}
			#video-controls button {
				padding: 0.25rem 0.5rem;
				font-size: 0.6875rem;
			}
			#license-note {
				display: none;
			}
		}
	</style>
</head>
<body>
<a href="../index.html" id="back-btn">&larr; Hub</a>

<div id="info">
	<strong>Video Texture</strong><br>
	Real HTML5 video mapped onto 3D surfaces using THREE.VideoTexture. Drag to orbit.
</div>

<div id="container"></div>

<div id="video-controls">
	<button id="btn-play-pause">Pause</button>
	<button id="btn-mute">Unmute</button>
	<span id="time-display">0:00 / 0:00</span>
</div>

<div id="license-note">
	<strong>Video source:</strong> "Sintel" by the
	<a href="https://durian.blender.org/" target="_blank" rel="noopener">Blender Foundation</a>,
	licensed under
	<a href="https://creativecommons.org/licenses/by/3.0/" target="_blank" rel="noopener">CC-BY 3.0</a>.
</div>

<script type="importmap">
{
	"imports": {
		"three": "https://unpkg.com/three@0.183.0/build/three.module.js",
		"three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
	}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// -- Video element setup --

const video = document.createElement( 'video' );
video.src = 'https://unpkg.com/three@0.183.0/examples/textures/sintel.mp4';
video.crossOrigin = 'anonymous';
video.loop = true;
video.muted = true;
video.playsInline = true;
video.preload = 'auto';

// -- Scene --

const scene = new THREE.Scene();
scene.background = new THREE.Color( 0x0a0e1a );
scene.fog = new THREE.FogExp2( 0x0a0e1a, 0.012 );

const renderer = new THREE.WebGLRenderer( { antialias: true } );
renderer.setPixelRatio( window.devicePixelRatio );
renderer.setSize( window.innerWidth, window.innerHeight );
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById( 'container' ).appendChild( renderer.domElement );

const camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 100 );
camera.position.set( 0, 2.5, 10 );

const controls = new OrbitControls( camera, renderer.domElement );
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set( 0, 1.5, 0 );
controls.minDistance = 3;
controls.maxDistance = 20;
controls.update();

// -- Lighting --

const ambientLight = new THREE.AmbientLight( 0xffffff, 0.2 );
scene.add( ambientLight );

const keyLight = new THREE.DirectionalLight( 0xffffff, 1.5 );
keyLight.position.set( 5, 8, 4 );
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar( 2048 );
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -10;
keyLight.shadow.camera.right = 10;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.bias = -0.001;
scene.add( keyLight );

const fillLight = new THREE.DirectionalLight( 0x4488ff, 0.4 );
fillLight.position.set( -4, 3, -2 );
scene.add( fillLight );

const screenGlow = new THREE.PointLight( 0x6699ff, 3, 8 );
screenGlow.position.set( 0, 2.5, 0.3 );
scene.add( screenGlow );

// -- Ground --

const groundMat = new THREE.MeshStandardMaterial( { color: 0x111522, roughness: 0.85, metalness: 0.15 } );
const ground = new THREE.Mesh( new THREE.PlaneGeometry( 40, 40 ), groundMat );
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add( ground );

// Grid helper for spatial reference
const grid = new THREE.GridHelper( 40, 40, 0x1a2040, 0x1a2040 );
grid.position.y = 0.005;
scene.add( grid );

// -- VideoTexture (the core of this demo) --

const videoTexture = new THREE.VideoTexture( video );
videoTexture.colorSpace = THREE.SRGBColorSpace;
videoTexture.minFilter = THREE.LinearFilter;
videoTexture.magFilter = THREE.LinearFilter;

// -- Surface 1: Flat screen (like a cinema display) --

const screenGeometry = new THREE.PlaneGeometry( 5.33, 3 );
const screenMaterial = new THREE.MeshBasicMaterial( { map: videoTexture } );

const flatScreen = new THREE.Mesh( screenGeometry, screenMaterial );
flatScreen.position.set( 0, 2.5, 0 );
scene.add( flatScreen );

// Frame around the flat screen
const frameMat = new THREE.MeshStandardMaterial( { color: 0x222222, roughness: 0.3, metalness: 0.8 } );
const frameTop = new THREE.Mesh( new THREE.BoxGeometry( 5.53, 0.1, 0.08 ), frameMat );
frameTop.position.set( 0, 4.05, 0 );
frameTop.castShadow = true;
scene.add( frameTop );

const frameBottom = new THREE.Mesh( new THREE.BoxGeometry( 5.53, 0.1, 0.08 ), frameMat );
frameBottom.position.set( 0, 0.95, 0 );
frameBottom.castShadow = true;
scene.add( frameBottom );

const frameLeft = new THREE.Mesh( new THREE.BoxGeometry( 0.1, 3.2, 0.08 ), frameMat );
frameLeft.position.set( -2.715, 2.5, 0 );
frameLeft.castShadow = true;
scene.add( frameLeft );

const frameRight = new THREE.Mesh( new THREE.BoxGeometry( 0.1, 3.2, 0.08 ), frameMat );
frameRight.position.set( 2.715, 2.5, 0 );
frameRight.castShadow = true;
scene.add( frameRight );

// Stand / pedestal
const standPole = new THREE.Mesh(
	new THREE.CylinderGeometry( 0.06, 0.06, 1 ),
	frameMat
);
standPole.position.set( 0, 0.5, 0 );
standPole.castShadow = true;
scene.add( standPole );

const standBase = new THREE.Mesh(
	new THREE.CylinderGeometry( 0.5, 0.6, 0.08, 32 ),
	frameMat
);
standBase.position.set( 0, 0.04, 0 );
standBase.castShadow = true;
standBase.receiveShadow = true;
scene.add( standBase );

// -- Surface 2: Curved screen (cylindrical section) --

const curvedGeometry = new THREE.CylinderGeometry( 3, 3, 2.2, 64, 1, true, Math.PI * 0.7, Math.PI * 0.6 );
const curvedMaterial = new THREE.MeshBasicMaterial( { map: videoTexture, side: THREE.BackSide } );

const curvedScreen = new THREE.Mesh( curvedGeometry, curvedMaterial );
curvedScreen.position.set( -5.5, 2.1, -2 );
curvedScreen.rotation.y = Math.PI * 0.25;
scene.add( curvedScreen );

// Label post for curved screen
const labelPostMat = new THREE.MeshStandardMaterial( { color: 0x333333, roughness: 0.4, metalness: 0.6 } );
const labelPost = new THREE.Mesh( new THREE.CylinderGeometry( 0.03, 0.03, 1 ), labelPostMat );
labelPost.position.set( -5.5, 0.5, -2 );
labelPost.castShadow = true;
scene.add( labelPost );

// -- Surface 3: Sphere (video mapped as equirectangular-ish) --

const sphereGeometry = new THREE.SphereGeometry( 1.2, 64, 32 );
const sphereMaterial = new THREE.MeshBasicMaterial( { map: videoTexture } );

const videoSphere = new THREE.Mesh( sphereGeometry, sphereMaterial );
videoSphere.position.set( 5.5, 2, -2 );
scene.add( videoSphere );

// Pedestal for sphere
const pedestalMat = new THREE.MeshStandardMaterial( { color: 0x1a1a2e, roughness: 0.5, metalness: 0.5 } );
const pedestal = new THREE.Mesh( new THREE.CylinderGeometry( 0.6, 0.7, 0.8, 32 ), pedestalMat );
pedestal.position.set( 5.5, 0.4, -2 );
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add( pedestal );

// -- Surface 4: Box / cube with video on all sides --

const boxGeometry = new THREE.BoxGeometry( 1.5, 1.5, 1.5 );
const boxMaterial = new THREE.MeshBasicMaterial( { map: videoTexture } );

const videoBox = new THREE.Mesh( boxGeometry, boxMaterial );
videoBox.position.set( -5, 1.2, 3.5 );
videoBox.castShadow = true;
scene.add( videoBox );

// -- Surface 5: Torus knot (complex UV mapping) --

const knotGeometry = new THREE.TorusKnotGeometry( 0.7, 0.25, 128, 32 );
const knotMaterial = new THREE.MeshBasicMaterial( { map: videoTexture } );

const videoKnot = new THREE.Mesh( knotGeometry, knotMaterial );
videoKnot.position.set( 5, 1.8, 3.5 );
scene.add( videoKnot );

// -- 3D labels (using sprite text) --

function createTextSprite( text, position ) {

	const canvas = document.createElement( 'canvas' );
	const ctx = canvas.getContext( '2d' );
	canvas.width = 512;
	canvas.height = 64;

	ctx.fillStyle = 'rgba(10, 14, 26, 0.85)';
	ctx.roundRect( 0, 0, 512, 64, 8 );
	ctx.fill();

	ctx.strokeStyle = 'rgba(74, 158, 255, 0.4)';
	ctx.lineWidth = 2;
	ctx.roundRect( 0, 0, 512, 64, 8 );
	ctx.stroke();

	ctx.fillStyle = '#e0e5f0';
	ctx.font = 'bold 28px Inter, system-ui, sans-serif';
	ctx.textAlign = 'center';
	ctx.textBaseline = 'middle';
	ctx.fillText( text, 256, 32 );

	const texture = new THREE.CanvasTexture( canvas );
	texture.colorSpace = THREE.SRGBColorSpace;

	const sprite = new THREE.Sprite(
		new THREE.SpriteMaterial( { map: texture, transparent: true, depthTest: false } )
	);
	sprite.position.copy( position );
	sprite.scale.set( 3, 0.375, 1 );
	scene.add( sprite );

	return sprite;

}

createTextSprite( 'Flat Screen', new THREE.Vector3( 0, 4.6, 0 ) );
createTextSprite( 'Curved Surface', new THREE.Vector3( -5.5, 3.8, -2 ) );
createTextSprite( 'Sphere', new THREE.Vector3( 5.5, 3.8, -2 ) );
createTextSprite( 'Cube', new THREE.Vector3( -5, 2.5, 3.5 ) );
createTextSprite( 'Torus Knot', new THREE.Vector3( 5, 3.2, 3.5 ) );

// -- Video playback controls --

const btnPlayPause = document.getElementById( 'btn-play-pause' );
const btnMute = document.getElementById( 'btn-mute' );
const timeDisplay = document.getElementById( 'time-display' );

let isPlaying = false;

function formatTime( seconds ) {

	if ( isNaN( seconds ) ) return '0:00';
	const m = Math.floor( seconds / 60 );
	const s = Math.floor( seconds % 60 );
	return m + ':' + ( s < 10 ? '0' : '' ) + s;

}

function startPlayback() {

	video.play().then( () => {

		isPlaying = true;
		btnPlayPause.textContent = 'Pause';
		btnPlayPause.classList.add( 'active' );

	} ).catch( ( err ) => {

		console.warn( 'Video play failed:', err.message );

	} );

}

btnPlayPause.addEventListener( 'click', () => {

	if ( isPlaying ) {

		video.pause();
		isPlaying = false;
		btnPlayPause.textContent = 'Play';
		btnPlayPause.classList.remove( 'active' );

	} else {

		startPlayback();

	}

} );

btnMute.addEventListener( 'click', () => {

	video.muted = ! video.muted;
	btnMute.textContent = video.muted ? 'Unmute' : 'Mute';
	btnMute.classList.toggle( 'active', ! video.muted );

} );

// -- Start playing once video data is available --

video.addEventListener( 'canplay', () => {

	startPlayback();

}, { once: true } );

video.load();

// -- Resize handler --

window.addEventListener( 'resize', () => {

	camera.aspect = window.innerWidth / window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize( window.innerWidth, window.innerHeight );

} );

// -- Animate --

function animate() {

	requestAnimationFrame( animate );

	const t = performance.now() * 0.001;

	// Gentle rotation on the sphere and knot
	videoSphere.rotation.y = t * 0.3;
	videoBox.rotation.y = t * 0.4;
	videoBox.rotation.x = t * 0.2;
	videoKnot.rotation.y = t * 0.5;
	videoKnot.rotation.x = t * 0.25;

	// Update time display
	timeDisplay.textContent = formatTime( video.currentTime ) + ' / ' + formatTime( video.duration );

	// Pulse the screen glow slightly based on video playback
	if ( isPlaying ) {

		screenGlow.intensity = 3 + Math.sin( t * 2 ) * 0.5;

	}

	controls.update();
	renderer.render( scene, camera );

}

animate();
</script>

<script src="../shared/demo-nav.js"></script>
</body>
</html>
